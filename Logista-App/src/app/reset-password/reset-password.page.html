<ion-content class="ion-padding reset-content">

  <!-- LOGO -->
  <div class="logo-container">
    <img src="assets/logista.jpeg" alt="Logista Logo" />
  </div>

  <!-- CARD -->
  <ion-card class="form-card">

    <ion-card-header>
      <ion-card-title>Reset Password</ion-card-title>
      <ion-card-subtitle>Masukkan password baru kamu</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>

      <!-- PASSWORD BARU -->
      <ion-input
        class="form-input"
        label="Password Baru"
        labelPlacement="floating"
        type="password"
        fill="outline"
        placeholder="Masukkan password baru"
        autocomplete="new-password"
        [(ngModel)]="newPassword">
      </ion-input>

      <!-- KONFIRMASI PASSWORD -->
      <ion-input
        class="form-input"
        label="Konfirmasi Password"
        labelPlacement="floating"
        type="password"
        fill="outline"
        placeholder="Ulangi password baru"
        autocomplete="new-password"
        [(ngModel)]="confirmPassword">
      </ion-input>

      <!-- BUTTON -->
      <ion-button
        expand="block"
        class="reset-btn"
        [disabled]="!newPassword || !confirmPassword"
        (click)="resetPassword()">
        Reset Password
      </ion-button>

    </ion-card-content>

  </ion-card>

</ion-content>
