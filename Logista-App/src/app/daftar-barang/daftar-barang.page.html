<ion-header translucent="true">

  <ion-toolbar class="modern-toolbar">

    <!-- BACK -->

    <ion-buttons slot="start">

      <ion-back-button
        defaultHref="/home">
      </ion-back-button>

    </ion-buttons>

    <!-- TITLE -->

    <ion-title>

      Daftar Barang

    </ion-title>

  </ion-toolbar>

</ion-header>

<ion-content
  fullscreen="true"
  class="barang-content">

  <div class="content-wrapper">

    <!-- SEARCH -->

    <ion-searchbar
      placeholder="Cari barang..."
      animated="true"
      class="modern-search"
      (ionInput)="filterBarang($event)">
    </ion-searchbar>

    <!-- CARD -->

    <ion-card
      class="barang-card"
      *ngFor="let item of barangList">

      <ion-card-content>

        <!-- HEADER -->

        <div class="top-section">

          <div class="barang-info">

            <h2>

              {{ item.nama_barang }}

            </h2>

            <p class="kode">

              {{ item.kode_barang }}

            </p>

          </div>

          <!-- BADGE -->

          <ion-badge

            class="modern-badge danger"

            *ngIf="item.total_stok <= item.stok_minimum">

            Stok Menipis

          </ion-badge>

          <ion-badge

            class="modern-badge success"

            *ngIf="item.total_stok > item.stok_minimum">

            Aman

          </ion-badge>

        </div>

        <!-- DETAIL BUTTON -->

        <div
          class="lihat-detail"
          (click)="toggleDetail(item)">

          <ion-icon
            [name]="
              item.showDetail
                ? 'chevron-up-outline'
                : 'chevron-down-outline'
            ">
          </ion-icon>

          <span>

            {{
              item.showDetail
                ? 'Sembunyikan Detail'
                : 'Lihat Detail'
            }}

          </span>

        </div>

        <!-- DETAIL -->

        <div *ngIf="item.showDetail">

          <div class="divider"></div>

          <div class="info-grid">

            <!-- TOTAL -->

            <div class="info-item">

              <div class="icon-box">

                <ion-icon
                  name="cube-outline">
                </ion-icon>

              </div>

              <div>

                <span>

                  Total Stok

                </span>

                <strong>

                  {{ item.total_stok }}
                  {{ item.satuan }}

                </strong>

              </div>

            </div>

            <!-- GUDANG -->

            <div class="info-item">

              <div class="icon-box">

                <ion-icon
                  name="business-outline">
                </ion-icon>

              </div>

              <div>

                <span>

                  Gudang

                </span>

                <strong>

                  {{ item.stok_gudang }}

                </strong>

              </div>

            </div>

            <!-- RAK -->

            <div class="info-item">

              <div class="icon-box">

                <ion-icon
                  name="grid-outline">
                </ion-icon>

              </div>

              <div>

                <span>

                  Stok Rak

                </span>

                <strong>

                  {{ item.stok_rak }}

                </strong>

              </div>

            </div>

            <!-- LOKASI -->

            <div class="info-item">

              <div class="icon-box">

                <ion-icon
                  name="location-outline">
                </ion-icon>

              </div>

              <div>

                <span>

                  Lokasi Rak

                </span>

                <strong>

                  {{ item.lokasi_rak }}

                </strong>

              </div>

            </div>

          </div>

        </div>

      </ion-card-content>

    </ion-card>

  </div>

</ion-content>
