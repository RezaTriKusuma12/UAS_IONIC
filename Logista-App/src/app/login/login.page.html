<ion-content [fullscreen]="true" class="login-content">

  <div class="login-wrapper">

    <div class="logo-container">
      <img src="assets/logista.jpeg" alt="Logista Logo" />
    </div>

    <div class="container">

      <ion-card class="login-card">

        <ion-card-header>
          <ion-card-title>Login</ion-card-title>
          <ion-card-subtitle>
            Login untuk masuk ke aplikasi
          </ion-card-subtitle>
        </ion-card-header>

        <ion-card-content>

          <ion-input
            class="form-input"
            label="Email"
            labelPlacement="floating"
            type="email"
            fill="outline"
            placeholder="Masukkan email"
            autocomplete="email"
            inputmode="email"
            [(ngModel)]="email">
          </ion-input>

          <div class="password-field">

            <ion-input
              class="form-input password-input"
              label="Password"
              labelPlacement="floating"
              [type]="showPassword ? 'text' : 'password'"
              fill="outline"
              placeholder="Masukkan password"
              autocomplete="current-password"
              [(ngModel)]="password">
            </ion-input>

            <button
              type="button"
              class="eye-btn"
              (click)="togglePassword()"
              aria-label="Lihat password">

              <ion-icon
                [icon]="showPassword ? eyeOffIcon : eyeIcon">
              </ion-icon>

            </button>

          </div>

          <ion-button
            expand="block"
            class="login-btn"
            [disabled]="!email || !password"
            (click)="login()">
            Login
          </ion-button>

          <div class="action-links">

            <button
              type="button"
              class="text-link"
              (click)="goToForgotPassword()">
              Lupa Password?
            </button>

          </div>

        </ion-card-content>

      </ion-card>

    </div>

    <div class="register">

      <span>Belum punya akun?</span>

      <button
        type="button"
        class="register-link"
        (click)="goToRegister()">
        Daftar
      </button>

    </div>

    <p class="privacy-login">
      Dengan menggunakan aplikasi ini, Anda menyetujui
      <a routerLink="/privacy-policy">
        Kebijakan Privasi
      </a>
    </p>

  </div>

</ion-content>
