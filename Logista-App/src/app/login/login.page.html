<ion-content [fullscreen]="true">

  <!-- LOGO -->
  <div class="logo-container">

    <img
      src="assets/logista.jpeg"
      alt="Logista Logo"
    />

  </div>

  <!-- LOGIN CARD -->
  <div class="container">

    <ion-card>

      <!-- HEADER -->
      <ion-card-header>

        <ion-card-title>
          Login
        </ion-card-title>

        <ion-card-subtitle>
          Login Untuk Masuk App
        </ion-card-subtitle>

      </ion-card-header>

      <!-- CONTENT -->
      <ion-card-content>

        <!-- EMAIL -->
        <ion-input
          label="Email"
          type="email"
          fill="outline"
          placeholder="Enter email"
          [(ngModel)]="email">
        </ion-input>

        <!-- PASSWORD -->
        <ion-input
          label="Password"
          type="password"
          fill="outline"
          placeholder="Enter password"
          [(ngModel)]="password">
        </ion-input>

        <!-- BUTTON LOGIN -->
        <ion-button
          expand="block"
          (click)="login()">

          Login

        </ion-button>

        <!-- FORGOT PASSWORD -->
        <div class="action-links">

          <span (click)="goToForgotPassword()">

            Lupa Password?

          </span>

        </div>

      </ion-card-content>

    </ion-card>

  </div>

  <!-- REGISTER -->
  <div class="register">

    <span>
      Belum punya akun?
    </span>

    <b (click)="goToRegister()">

      Daftar

    </b>

  </div>

</ion-content>
