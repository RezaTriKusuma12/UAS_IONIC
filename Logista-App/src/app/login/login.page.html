<ion-content [fullscreen]="true">

 

  <!-- LOGO -->
  <div class="logo-container">
    <img src="assets/logista.jpeg" />
  </div>

  <!-- LOGIN CARD -->
  <div class="container">
    <ion-card>

      <ion-card-header>
        <ion-card-title>Login</ion-card-title>
        <ion-card-subtitle>Login Untuk Masuk App</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
       <ion-input 
  label="Email" 
  type="email"
  fill="outline" 
  placeholder="Enter email"
  [(ngModel)]="email">
</ion-input>

<ion-input 
  type="password" 
  label="Password" 
  fill="outline" 
  placeholder="Enter password"
  [(ngModel)]="password">
</ion-input>

<ion-button expand="block" (click)="login()">
  Login
</ion-button>

         <!-- LUPA PASSWORD -->
        <div class="action-links">
        <span (click)="goToForgotPassword()">Lupa Password?</span>
        </div>
        <br />

      </ion-card-content>

    </ion-card>
  </div>


<!-- DAFTAR -->
<div class="register">
  <span>Belum punya akun?</span>
  <b (click)="goToRegister()">Daftar</b>
</div>

</ion-content>
