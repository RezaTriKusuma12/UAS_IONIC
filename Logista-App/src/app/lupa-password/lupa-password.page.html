<ion-content [fullscreen]="true" class="forgot-content">
  <div class="forgot-wrapper">

    <div class="logo-container">
      <img src="assets/logista.jpeg" alt="Logista Logo" />
    </div>

    <ion-card class="form-card">
      <ion-card-header>
        <ion-card-title>Reset Password</ion-card-title>
        <ion-card-subtitle>Masukkan email untuk menerima kode OTP</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <ion-input
          class="form-input"
          label="Email"
          labelPlacement="floating"
          type="email"
          fill="outline"
          placeholder="Masukkan email"
          autocomplete="email"
          inputmode="email"
          [(ngModel)]="email">
        </ion-input>

        <ion-button
          expand="block"
          class="submit-btn"
          [disabled]="!email"
          (click)="sendOtp()">
          Kirim OTP
        </ion-button>
      </ion-card-content>
    </ion-card>

  </div>
</ion-content>
