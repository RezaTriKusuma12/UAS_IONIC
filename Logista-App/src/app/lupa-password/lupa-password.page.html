<ion-content class="ion-padding">

  <!-- LOGO -->
  <div class="logo-container">
    <img src="assets/logista.png" alt="Logo" />
  </div>

  <!-- CARD -->
  <ion-card class="form-card">

    <ion-card-header>
      <ion-card-title>Reset Password</ion-card-title>
      <ion-card-subtitle>Masukkan Email Untuk Reset Password</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>

      <!-- ✅ FIX DI SINI -->
      <ion-input
        label="Email"
        type="email"
        fill="outline"
        placeholder="Enter Email"
        [(ngModel)]="email">
      </ion-input>

      <ion-button expand="full" (click)="sendOtp()">
        Kirim OTP
      </ion-button>

    </ion-card-content>

  </ion-card>

</ion-content>
