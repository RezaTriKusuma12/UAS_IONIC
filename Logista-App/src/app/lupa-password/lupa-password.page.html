<ion-content
  [fullscreen]="true"
  class="ion-padding">

  <!-- LOGO -->
  <div class="logo-container">

    <img
      src="assets/logista.jpeg"
      alt="Logo"
    />

  </div>

  <!-- CARD -->
  <ion-card class="form-card">

    <!-- HEADER -->
    <ion-card-header>

      <ion-card-title>
        Reset Password
      </ion-card-title>

      <ion-card-subtitle>
        Masukkan Email Untuk Reset Password
      </ion-card-subtitle>

    </ion-card-header>

    <!-- CONTENT -->
    <ion-card-content>

      <!-- EMAIL -->
      <ion-input
        label="Email"
        type="email"
        fill="outline"
        placeholder="Enter Email"
        [(ngModel)]="email">
      </ion-input>

      <!-- BUTTON -->
      <ion-button
        expand="block"
        (click)="sendOtp()">

        Kirim OTP

      </ion-button>

    </ion-card-content>

  </ion-card>

</ion-content>
