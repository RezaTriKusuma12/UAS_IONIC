<ion-header class="app-header">
  <ion-toolbar class="modern-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>

    <ion-title>Mutasi Barang</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="mutasi-content">
  <div class="page-container">

    <ion-card class="form-card">
      <ion-card-header>
        <ion-card-title>Form Mutasi Barang</ion-card-title>
        
      </ion-card-header>

      <ion-card-content>

        <ion-item class="form-item">
          <ion-select
            label="Pilih Barang"
            labelPlacement="stacked"
            interface="popover"
            placeholder="Pilih barang"
            [(ngModel)]="selectedBarang">

            <ion-select-option
              *ngFor="let item of barangList"
              [value]="item">
              {{ item.nama_barang }}
            </ion-select-option>

          </ion-select>
        </ion-item>

        <div *ngIf="selectedBarang" class="stok-info">
          <div class="stok-row">
            <span>Stok Gudang</span>
            <strong>{{ selectedBarang.stok_gudang }}</strong>
          </div>

          <div class="stok-row">
            <span>Stok Rak</span>
            <strong>{{ selectedBarang.stok_rak || 0 }}</strong>
          </div>
        </div>

        <ion-item class="form-item">
          <ion-input
            type="number"
            inputmode="numeric"
            min="1"
            label="Qty Mutasi"
            labelPlacement="stacked"
            placeholder="Masukkan qty mutasi"
            [(ngModel)]="qtyMutasi">
          </ion-input>
        </ion-item>

        <ion-item class="form-item">
          <ion-input
            label="Lokasi Asal"
            labelPlacement="stacked"
            placeholder="Contoh: Gudang"
            [(ngModel)]="lokasiAsal">
          </ion-input>
        </ion-item>

        <ion-item class="form-item">
          <ion-input
            label="Lokasi Tujuan"
            labelPlacement="stacked"
            placeholder="Contoh: Rak A1"
            [(ngModel)]="lokasiTujuan">
          </ion-input>
        </ion-item>

        <ion-item class="form-item textarea-item">
          <ion-textarea
            label="Catatan"
            labelPlacement="stacked"
            placeholder="Tambahkan catatan jika ada"
            rows="4"
            autoGrow="true"
            [(ngModel)]="catatan">
          </ion-textarea>
        </ion-item>

        <ion-button
          expand="block"
          class="submit-btn"
          [disabled]="!selectedBarang || !qtyMutasi || qtyMutasi <= 0 || !lokasiAsal || !lokasiTujuan"
          (click)="submitMutasi()">
          Simpan Mutasi
        </ion-button>

      </ion-card-content>
    </ion-card>

  </div>
</ion-content>
