<ion-content [fullscreen]="true">

  <!-- LOGO -->
  <div class="logo-container">
    <img src="assets/logista.jpeg" />
  </div>

  <!-- REGISTER CARD -->
  <div class="container">
    <ion-card>

      <ion-card-header>
        <ion-card-title>Daftar</ion-card-title>
        <ion-card-subtitle>Buat akun baru</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>

        <ion-input label="Email" type="email" fill="outline"
          [(ngModel)]="email" placeholder="Enter email"></ion-input>

        <ion-input label="Nama Lengkap" fill="outline"
          [(ngModel)]="name" placeholder="Enter full name"></ion-input>

        <ion-input label="Username" fill="outline"
          [(ngModel)]="username" placeholder="Enter username"></ion-input>

        <ion-input type="password" label="Password" fill="outline"
          [(ngModel)]="password" placeholder="Enter password"></ion-input>

        <ion-button expand="block" (click)="register()">Daftar</ion-button>

      </ion-card-content>

    </ion-card>
  </div>

  <!-- LOGIN -->
<div class="register">
  <span>Sudah punya akun?</span>
  <b (click)="goToLogin()">Login</b>
</div>

</ion-content>
