<ion-header class="app-header">

  <ion-toolbar>

    <ion-buttons slot="start">

      <ion-back-button
        defaultHref="/home">
      </ion-back-button>

    </ion-buttons>

    <ion-title>
      Barang Keluar
    </ion-title>

  </ion-toolbar>

</ion-header>

<ion-content
  class="barang-keluar-content"
  [fullscreen]="true">

  <div class="page-container">

    <ion-card class="form-card">

      <ion-card-header>

        <ion-card-title>
          Form Barang Keluar
        </ion-card-title>

        

      </ion-card-header>

      <ion-card-content>

        <!-- PILIH BARANG -->

        <ion-item class="form-item">

          <ion-select
            label="Pilih Barang"
            labelPlacement="stacked"
            interface="popover"
            placeholder="Pilih barang"
            [(ngModel)]="barang_id"
            (ionChange)="pilihBarang()">

            <ion-select-option
              *ngFor="let item of barangList"
              [value]="item.id">

              {{ item.nama_barang }}

            </ion-select-option>

          </ion-select>

        </ion-item>

        <!-- INFO BARANG -->

        <div
          *ngIf="barangDipilih"
          class="info-barang">

          <div class="info-header">

            <div>

              <h2>
                {{ barangDipilih.nama_barang }}
              </h2>

              <p class="kode-barang">
                {{ barangDipilih.kode_barang }}
              </p>

            </div>

          </div>

          <div class="stok-box">

            <span>
              Stok Rak
            </span>

            <strong>
              {{ barangDipilih.stok_rak }}
              {{ barangDipilih.satuan }}
            </strong>

          </div>

        </div>

        <!-- QTY -->

        <ion-item class="form-item">

          <ion-input
            type="number"
            inputmode="numeric"
            min="1"
            label="Qty Keluar"
            labelPlacement="stacked"
            placeholder="Masukkan qty keluar"
            [(ngModel)]="qtyKeluar">
          </ion-input>

        </ion-item>

        <!-- TUJUAN -->

        <ion-item class="form-item">

          <ion-input
            label="Tujuan"
            labelPlacement="stacked"
            placeholder="Contoh: Rak Display / Customer / Cabang"
            [(ngModel)]="tujuanRak">
          </ion-input>

        </ion-item>

        <!-- CATATAN -->

        <ion-item class="form-item textarea-item">

          <ion-textarea
            label="Catatan"
            labelPlacement="stacked"
            placeholder="Tambahkan catatan jika ada"
            rows="4"
            autoGrow="true"
            [(ngModel)]="catatan">
          </ion-textarea>

        </ion-item>

        <!-- BUTTON -->

        <ion-button
          expand="block"
          class="submit-button"
          [disabled]="!barang_id || !qtyKeluar || qtyKeluar <= 0 || !tujuanRak"
          (click)="submitBarangKeluar()">

          Keluarkan Barang

        </ion-button>

      </ion-card-content>

    </ion-card>

  </div>

</ion-content>
